  source-code:
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: run semgrep
        run: semgrep --config .semgrep --sarif --output semgrep.sarif

      - name: upload sarif
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
